<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Días sin incidencias de camiones</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1565c0, #0d47a1);
      font-family: 'Segoe UI', Arial, sans-serif;
    }

    .container {
      text-align: center;
      padding: 40px 24px;
    }

    .heading {
      color: rgba(255, 255, 255, 0.8);
      font-size: clamp(22px, 3.5vw, 48px);
      font-weight: 300;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 24px;
      max-width: 900px;
    }

    .counter {
      color: #ffffff;
      font-size: clamp(180px, 40vw, 480px);
      font-weight: 900;
      line-height: 1;
    }

    .last-incident {
      color: rgba(255, 255, 255, 0.45);
      font-size: clamp(16px, 2vw, 28px);
      letter-spacing: 1px;
      margin-top: 28px;
    }
  </style>
</head>
<body>
  <div class="container">
    <p class="heading">Número de días sin incidencias de camiones</p>
    <p class="counter" id="days">—</p>
    <!-- UPDATE THIS DATE WHEN A NEW INCIDENT OCCURS -->
    <p class="last-incident">Última incidencia: 10/04/2026</p>
  </div>

  <script>
    const lastIncident = "2026-04-10"; // ← change this date (format: YYYY-MM-DD)
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const incident = new Date(lastIncident);
    incident.setHours(0, 0, 0, 0);
    const days = Math.floor((today - incident) / 86400000);
    document.getElementById("days").textContent = days;
  </script>
</body>
</html>
