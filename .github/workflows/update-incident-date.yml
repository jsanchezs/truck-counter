name: Update incident date to today

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-date:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update incident date and push
        run: |
          python3 - <<'EOF'
          import re, datetime

          today = datetime.date.today()
          iso = today.strftime('%Y-%m-%d')
          display = today.strftime('%d/%m/%Y')

          with open('index.html', 'r', encoding='utf-8') as f:
              content = f.read()

          content = re.sub(r'const lastIncident = "[^"]*"', f'const lastIncident = "{iso}"', content)
          content = re.sub(r'incidencia: \d{2}/\d{2}/\d{4}', f'incidencia: {display}', content)

          with open('index.html', 'w', encoding='utf-8') as f:
              f.write(content)

          print(f'Updated to {iso} ({display})')
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet && echo "Date already up to date, nothing to commit." || \
            git commit -m "chore: update incident date to $(date +%Y-%m-%d)"
          git push
